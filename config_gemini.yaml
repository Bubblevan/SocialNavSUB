# baseline_model: "dummy"
# baseline_model: "llava-video"   # 本地模型时配合 llava_video_path 使用
# baseline_model: "qwen3-vl"      # 同样也是本地模型
# baseline_model: "navila"        # 基线NVILA模型

# baseline_model: "LLaVa"

baseline_model: "gemini-2.5-flash-lite"
# baseline_model: "gpt-5-nano"

model_to_api_key: {"gpt4o": "OPENAI_API_KEY", "gemini": "GOOGLE_API_KEY"}
openai_base_url: "https://www.dmxapi.cn/v1"
openai_api_key_env: "api_key"
# Gemini 走 DMXAPI 时用同一 key，设 gemini_base_url 或 openai_base_url + gemini_api_key_env
gemini_api_key_env: "api_key"
# 本地 LLaVA-NeXT-Video 路径（相对项目根或绝对路径）；不设则从 HF 下载
# llava_video_path: "llava-next-video-7b"
# qwen3_vl_path: "qwen3-vl-8b"
# navila_path: "navila-llama3-8b-8f"
# llava 量化显存不足可设（需 pip install bitsandbytes）：4 或 8
# quantization_bits: 4
method: "cot"
survey_folder: data/human_labels
dataset_folder: data/human_labels
data_folder: data
frontview_folder: data/front_view
dataset_cfg_fp: data/dataset_cfg.yaml
# contains all prompts
prompts_folder: data/prompts
evaluation_folder: experiments
postprocessed_results_csv: postprocessed_results.csv
# evaluation_folder: eval_pilot_tuning

prompt_image_fp: grid_with_bev.png # outdated

# possible options for prompt_img_type: "img_with_bev", "img", "bev", "grid", "grid_with_bev"
prompt_img_type: "img_with_bev"
include_time_annotations_img: false
include_time_annotations_bev: false

# hyperparams for image prompt
circle_rad_annotated_img: 30
thickness_annotated_img: 5
font_scale_annotated_img: 1.3
left_offset_annotated_img: 14

markersize_bev: 20
fontsize_bev: 15
arrow_width_bev: 0.1
fixed_arrow_length_bev: 0.5
linewidth_bev: 3

debug: false

survey_prompt: "data/survey_prompt.json"

rulebased_baseline:
  # Image preprocessing
  blur_ksize: 5

  # HoughCircles parameters
  hough_dp: 1.2
  hough_minDist: 20
  hough_param1: 100
  hough_param2: 30
  hough_minRadius: 10
  hough_maxRadius: 60

  # Tesseract OCR parameters
  tesseract_psm: 8
  tesseract_oem: 3
  tesseract_char_whitelist: "0123456789RG"

  # Number of frames per subfolder
  num_frames: 10

  # Spatial and distance thresholds
  spatial_offset_threshold: 0.4
  distance_change_threshold: 0.3
  obstruction_distance_threshold: 0.1

  # Robot movement thresholds
  robot_turn_threshold: 0.3
  robot_move_threshold: 0.1