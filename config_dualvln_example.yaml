# Example configuration for DualVLN evaluation
# Copy this to config.yaml and adjust paths as needed

baseline_model: "dualvln"

# Path to directory containing DualVLN output logs
# Each file should be named {sample_id}.txt (e.g., "101_Spot_1_155.txt")
dualvln_outputs_dir: "dualvln_outputs/"

# Image dimensions for pixel-to-position mapping
# These should match the resolution of images DualVLN processed
image_height: 480
image_width: 640

# Standard SocialNav-SUB config (adjust paths as needed)
method: "independent"
survey_folder: data/human_labels
dataset_folder: data/human_labels
data_folder: data
frontview_folder: data/front_view
dataset_cfg_fp: data/dataset_cfg.yaml
prompts_folder: data/prompts
evaluation_folder: experiments
postprocessed_results_csv: postprocessed_results.csv

prompt_image_fp: grid_with_bev.png

prompt_img_type: "img_with_bev"
include_time_annotations_img: false
include_time_annotations_bev: false

# Image annotation hyperparameters
circle_rad_annotated_img: 30
thickness_annotated_img: 5
font_scale_annotated_img: 1.3
left_offset_annotated_img: 14

markersize_bev: 20
fontsize_bev: 15
arrow_width_bev: 0.1
fixed_arrow_length_bev: 0.5
linewidth_bev: 3

debug: false

survey_prompt: "data/survey_prompt.json"

# API keys not needed for DualVLN
model_to_api_key: {}
